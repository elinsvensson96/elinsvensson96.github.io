    <script>

        let appointment = {}

        let appointments = []


        function saveAppointment() {

            let behandling = document.getElementById('treatment').value
            let stad = document.getElementById('city').value
            let datum = document.getElementById('calender').value

            console.log(behandling, stad, datum)


            appointment.treatment = behandling,
                appointment.city = stad,
                appointment.date = datum

            showPersonInfo()

        }

        function showPersonInfo() {

            document.getElementById('main').innerHTML = ` 
            <div id="second-step">
                <form action="">
                    <label for="firstName">Förnamn:</label>
                    <input type="text" id="firstName">
                    <label for="lastName">Efternamn:</label>

                    <label for="email">E-postadress:</label>
                    <input type="text" id="email">
                    <label for="phoneNumber">Telefonnummer:</label>
                    <input type="text" id="phoneNumber">
                </form> 
                <button onclick="savePersonInfo()">Slutför bokning</button>
            </div>
        `
        }

        function savePersonInfo() {
            let firstName = document.getElementById('firstName').value
            let lastName = document.getElementById('lastName').value
            let email = document.getElementById('email').value
            let phoneNumber = document.getElementById('phoneNumber').value

            appointment.name = firstName
            appointment.lastName = lastName
            appointment.email = email
            appointment.phoneNumber = phoneNumber

            console.log(appointment)

            appointments.push(appointment)

            showReservation()
        }

        function showReservation() {
            document.getElementById('main').innerHTML = `
            <div id="booking">
                 <div>
                <h2>Tack för din bokning.</h2>
                <h5>Vi ser fram emot att träffa dig! Nedan hittar du information om din bokning.</h5></div>
                <div> <p>Namn: ${appointment.name + appointment.lastName}</p>
                <p>E-post: ${appointment.email}</p>
                <p>Telefon: ${appointment.phoneNumber}</p>
                <p>Tid: ${appointment.date}</p>
                <p>Tjänst: ${appointment.treatment}</p>
                <p>Plats:${appointment.city}</p></div>
            </div> `
        }
